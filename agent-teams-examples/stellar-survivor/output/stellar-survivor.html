  _drawHighScores() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, WORLD_W, WORLD_H);

    ctx.fillStyle = C.menuTitle;
    ctx.font = 'bold 28px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('HIGH SCORES', WORLD_W/2, 60);

    if (this.highScores.length === 0) {
      ctx.fillStyle = C.uiDim;
      ctx.font = '16px monospace';
      ctx.fillText('No scores yet!', WORLD_W/2, 250);
    } else {
      for (let i = 0; i < this.highScores.length; i++) {
        const hs = this.highScores[i];
        ctx.fillStyle = i === 0 ? C.combo : C.uiText;
        ctx.font = `${16 - i}px monospace`;
        ctx.textAlign = 'left';
        ctx.fillText(`${i+1}.`, 200, 130 + i * 40);
        ctx.fillText(hs.score.toString(), 240, 130 + i * 40);
        ctx.textAlign = 'right';
        ctx.fillText(hs.date || '', 600, 130 + i * 40);
      }
    }

    ctx.fillStyle = C.menuSel;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PRESS ENTER TO RETURN', WORLD_W/2, 520);
    ctx.textAlign = 'start';
  }

  _drawPauseMenu() {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, WORLD_W, WORLD_H);

    ctx.fillStyle = C.menuTitle;
    ctx.font = 'bold 36px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', WORLD_W/2, 180);

    for (let i = 0; i < this.pauseOptions.length; i++) {
      const isSel = i === this.pauseOption;
      ctx.font = `bold ${isSel ? 20 : 16}px monospace`;
      ctx.fillStyle = isSel ? C.menuSel : C.menuNorm;
      ctx.fillText(isSel ? `> ${this.pauseOptions[i]} <` : this.pauseOptions[i], WORLD_W/2, 280 + i * 45);
    }

    ctx.fillStyle = C.uiDim;
    ctx.font = '12px monospace';
    ctx.fillText('Arrow Keys = Navigate  |  Enter = Select  |  P = Resume', WORLD_W/2, 450);
    ctx.textAlign = 'start';
  }

  _drawLevelClear() {
    ctx.fillStyle = `rgba(0,0,0,${0.5 + this.transitionAlpha * 0.4})`;
    ctx.fillRect(0, 0, WORLD_W, WORLD_H);

    ctx.fillStyle = `rgba(0,220,255,${this.transitionAlpha})`;
    ctx.font = 'bold 32px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`LEVEL ${this.currentLevel} COMPLETE!`, WORLD_W/2, 250);

    ctx.fillStyle = `rgba(255,255,255,${this.transitionAlpha})`;
    ctx.font = '16px monospace';
    ctx.fillText(`Score: ${Math.floor(this.score)}`, WORLD_W/2, 290);
    ctx.fillText(`Enemies Killed: ${this.enemiesKilled}`, WORLD_W/2, 315);
    ctx.fillText(`Accuracy: ${this.shotsFired > 0 ? Math.round(this.shotsHit/this.shotsFired*100) : 0}%`, WORLD_W/2, 340);
    ctx.textAlign = 'start';
  }

  _drawShop() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, WORLD_W, WORLD_H);

    ctx.fillStyle = C.menuTitle;
    ctx.font = 'bold 28px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('UPGRADE SHOP', WORLD_W/2, 45);
    ctx.fillStyle = C.combo;
    ctx.font = '14px monospace';
    ctx.fillText(`Points: ${this.player.upgradePoints}`, WORLD_W/2, 70);

    // Stats
    ctx.fillStyle = C.uiText;
    ctx.font = '12px monospace';
    ctx.fillText(`Speed: ${Math.floor((1+this.player.speedLvl*0.1)*100)}%  |  Fire Rate: ${Math.floor((1-this.player.fireRateLvl*0.1)*100)}%  |  HP: ${this.player.maxHp}`, WORLD_W/2, 90);

    const shopY = 140;
    for (let i = 0; i < UPGRADES.length; i++) {
      const u = UPGRADES[i];
      const lvl = this.player[u.stat];
      const isSel = i === this.shopOption;
      const maxed = lvl >= u.maxLvl;

      ctx.font = `bold ${isSel ? 16 : 14}px monospace`;
      ctx.fillStyle = isSel ? C.menuSel : (maxed ? C.uiDim : C.uiText);
      ctx.textAlign = 'center';
      const text = `${u.name} [${lvl}/${u.maxLvl}] — ${u.desc} — ${maxed ? 'MAX' : `Cost: ${u.cost}pt`}`;
      ctx.fillText(isSel ? `> ${text} <` : text, WORLD_W/2, shopY + i * 35);
    }

    // Continue option
    const contIdx = UPGRADES.length;
    const isContSel = this.shopOption === contIdx;
    ctx.fillStyle = isContSel ? C.menuSel : C.uiText;
    ctx.font = `bold ${isContSel ? 18 : 15}px monospace`;
    ctx.fillText(isContSel ? '> CONTINUE <' : 'CONTINUE', WORLD_W/2, shopY + contIdx * 35);

    ctx.fillStyle = C.uiDim;
    ctx.font = '11px monospace';
    ctx.fillText('Enter = Buy/Continue  |  P = Skip Shop', WORLD_W/2, 440);
    ctx.textAlign = 'start';
  }

  _drawGameOver() {
    ctx.fillStyle = `rgba(20,0,0,${0.5 + this.transitionAlpha * 0.45})`;
    ctx.fillRect(0, 0, WORLD_W, WORLD_H);

    const alpha = this.transitionAlpha;

    ctx.fillStyle = `rgba(255,50,50,${alpha})`;
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#ff0000';
    ctx.fillText('GAME OVER', WORLD_W/2, 180);
    ctx.shadowBlur = 0;

    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.font = '18px monospace';
    ctx.fillText(`Final Score: ${Math.floor(this.score)}`, WORLD_W/2, 250);
    ctx.fillText(`Level: ${this.currentLevel}  |  Kills: ${this.enemiesKilled}`, WORLD_W/2, 275);
    ctx.fillText(`Accuracy: ${this.shotsFired > 0 ? Math.round(this.shotsHit/this.shotsFired*100) : 0}%`, WORLD_W/2, 295);

    if (this._isNewHighScore()) {
      ctx.fillStyle = `rgba(255,200,0,${alpha})`;
      ctx.font = 'bold 22px monospace';
      ctx.fillText('★ NEW HIGH SCORE! ★', WORLD_W/2, 340);
    }

    ctx.fillStyle = `rgba(200,200,255,${alpha})`;
    ctx.font = '15px monospace';
    ctx.fillText('[R / Space] Restart    [Q / Esc] Menu', WORLD_W/2, 420);
    ctx.textAlign = 'start';
  }

  _drawVictory() {
    ctx.fillStyle = `rgba(0,10,20,${0.5 + this.transitionAlpha * 0.45})`;
    ctx.fillRect(0, 0, WORLD_W, WORLD_H);

    const alpha = this.transitionAlpha;

    ctx.fillStyle = `rgba(0,255,200,${alpha})`;
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#00ffcc';
    ctx.fillText('VICTORY!', WORLD_W/2, 140);
    ctx.shadowBlur = 0;

    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.font = '18px monospace';
    ctx.fillText('YOU SAVED THE GALAXY!', WORLD_W/2, 180);

    ctx.font = '16px monospace';
    ctx.fillText(`Final Score: ${Math.floor(this.score)}`, WORLD_W/2, 230);
    ctx.fillText(`Enemies Killed: ${this.enemiesKilled}`, WORLD_W/2, 255);
    ctx.fillText(`Accuracy: ${this.shotsFired > 0 ? Math.round(this.shotsHit/this.shotsFired*100) : 0}%`, WORLD_W/2, 275);

    if (this._isNewHighScore()) {
      ctx.fillStyle = `rgba(255,200,0,${alpha})`;
      ctx.font = 'bold 22px monospace';
      ctx.fillText('★ NEW HIGH SCORE! ★', WORLD_W/2, 320);
    }

    ctx.fillStyle = `rgba(200,200,255,${alpha})`;
    ctx.font = '15px monospace';
    ctx.fillText('[R / Space] Play Again    [Q / Esc] Menu', WORLD_W/2, 400);
    ctx.textAlign = 'start';
  }

  // ---- GAME ACTIONS ----
  _startGame() {
    this.player.reset();
    this.score = 0;
    this.combo = 1;
    this.comboTimer = 0;
    this.enemiesKilled = 0;
    this.shotsFired = 0;
    this.shotsHit = 0;
    this.timePlayed = 0;
    this.currentLevel = 1;
    this.transitionAlpha = 0;
    this.screenShakeX = 0;
    this.screenShakeY = 0;

    enemies.releaseAll();
    bullets.releaseAll();
    particles.releaseAll();
    powerups.releaseAll();

    this.levelMgr.loadLevel(1);
    this.state = STATE.PLAYING;
    audio.init();
    audio.musicOn = true;
    audio.setMusicIntensity(1);
    audio.startMusic();
  }

  _startNextLevel() {
    this.currentLevel++;
    if (this.currentLevel > 5) {
      this._victory();
      return;
    }
    enemies.releaseAll();
    bullets.releaseAll();
    particles.releaseAll();
    powerups.releaseAll();
    this.levelMgr.loadLevel(this.currentLevel);
    this.levelMgr.boss = null;
    this.levelMgr.bossActive = false;
    this.levelMgr.bossSpawned = false;
    this.levelMgr.allWavesDone = false;
    this.state = STATE.PLAYING;
    audio.setMusicIntensity(this.currentLevel >= 4 ? 2 : 1);
  }

  _killEnemy(enemy) {
    enemy.aiState = 'dead';
    enemies.release(enemy);

    const theme = LEVEL_THEMES[this.currentLevel];
    const baseScore = enemy.score;
    this.comboTimer = 1.5;
    if (this.combo < 6) this.combo++;
    if (this.combo >= 3) audio.playSound('comboUp', this.combo);
    const multBonus = this.player.multiplierTimer > 0 ? 2 : 1;
    this.score += baseScore * this.combo * multBonus;
    this.enemiesKilled++;

    emitExplosion(enemy.x, enemy.y, 15 * (enemy.isBoss ? 3 : 1), enemy.color, enemy.isBoss ? 2 : 1);
    audio.playSound('enemyDeath');

    // Power-up drop chance
    if (!enemy.isBoss && Math.random() < enemy.dropChance) {
      this._dropPowerUp(enemy.x, enemy.y);
    }
  }

  _killBoss() {
    const boss = this.levelMgr.boss;
    this.score += boss.score * this.combo * (this.player.multiplierTimer > 0 ? 2 : 1);
    this.enemiesKilled++;
    emitExplosion(boss.x, boss.y, 40, boss.color, 3);
    audio.playSound('enemyDeath');
    audio.setMusicIntensity(1);
    enemies.release(boss);
    this.levelMgr.boss = null;
    this.levelMgr.bossActive = false;
    // Boss always drops a power-up
    this._dropPowerUp(boss.x, boss.y, true);
    this._levelComplete();
  }

  _dropPowerUp(x, y, bossDrop=false) {
    const pu = powerups.get();
    if (!pu) return;
    const types = ['HEAL','RAPIDFIRE','SHIELD','SPEED','MULTIPLIER'];
    const weights = [0.30, 0.20, 0.15, 0.15, 0.15, 0.05]; // last is NUKE
    if (bossDrop) {
      const rareTypes = ['NUKE','SHIELD','MULTIPLIER','RAPIDFIRE'];
      const type = rareTypes[Math.floor(Math.random() * rareTypes.length)];
      pu.init(x, y, type);
    } else {
      const r = Math.random();
      let cum = 0;
      for (let i = 0; i < weights.length; i++) {
        cum += weights[i];
        if (r <= cum) {
          const allTypes = [...types, 'NUKE'];
          pu.init(x, y, allTypes[i]);
          break;
        }
      }
    }
  }

  _collectPowerUp(pu) {
    const type = pu.type;
    audio.playSound('powerupCollect');
    switch(type) {
      case 'HEAL':
        this.player.heal(30);
        break;
      case 'RAPIDFIRE':
        this.player.rapidFireTimer = 8;
        break;
      case 'SHIELD':
        this.player.activateShield(3 + this.player.shieldLvl);
        break;
      case 'SPEED':
        this.player.speedTimer = 10;
        break;
      case 'MULTIPLIER':
        this.player.multiplierTimer = 10;
        break;
      case 'NUKE':
        audio.playSound('nuke');
        enemies.forEachActive(e => {
          if (!e.isBoss) {
            e.hp = 0;
            this._killEnemy(e);
          } else {
            e.hp -= 100;
            if (e.hp <= 0) this._killBoss();
          }
        });
        // Clear enemy bullets
        bullets.forEachActive(b => { if (b.isEnemy) b.life = 0; });
        emitExplosion(this.player.x, this.player.y, 50, '#ff00ff', 3);
        this._addScreenShake(8);
        break;
    }
  }

  _levelComplete() {
    this.state = STATE.LEVELCLEAR;
    this.transitionAlpha = 0;
    this.levelClearDisplay = 0;
    this.shopPts = 1 + Math.floor(this.currentLevel / 2);
    this.player.upgradePoints = this.shopPts;

    // Level completion bonus
    this.score += this.currentLevel * 500 * (this.player.multiplierTimer > 0 ? 2 : 1);
    if (this.player.hp >= this.player.maxHp) this.score += 200; // no-damage bonus

    enemies.releaseAll();
    bullets.releaseAll();
    powerups.releaseAll();
    audio.setMusicIntensity(0);
  }

  _buyUpgrade() {
    const u = UPGRADES[this.shopOption];
    const lvl = this.player[u.stat];
    if (lvl >= u.maxLvl) return;
    if (this.player.upgradePoints < u.cost) return;
    this.player.upgradePoints -= u.cost;
    this.player[u.stat]++;

    // Apply effects
    if (u.stat === 'armorLvl') this.player.maxHp = 100 + this.player.armorLvl * 15;
    if (u.stat === 'shieldLvl') this.player.shieldMaxHits = 3 + this.player.shieldLvl;

    audio.playSound('upgradeBuy');
  }

  _gameOver() {
    this.state = STATE.GAMEOVER;
    this.transitionAlpha = 0;
    this._saveHighScore();
    audio.stopMusic();
    setTimeout(() => audio.playSound('gameOver'), 300);
    enemies.releaseAll();
    bullets.releaseAll();
    powerups.releaseAll();
  }

  _victory() {
    this.state = STATE.VICTORY;
    this.transitionAlpha = 0;
    this._saveHighScore();
    audio.stopMusic();
    audio.playSound('victory');
  }

  _restartGame() {
    this.state = STATE.MENU;
    this.transitionAlpha = 0;
    this.menuOption = 0;
    audio.stopMusic();
    audio.musicOn = true;
    setTimeout(() => this._startGame(), 100);
  }

  _goToMenu() {
    this.state = STATE.MENU;
    this.transitionAlpha = 0;
    this.menuOption = 0;
    this.player.reset();
    enemies.releaseAll();
    bullets.releaseAll();
    particles.releaseAll();
    powerups.releaseAll();
    audio.stopMusic();
    audio.musicOn = false;
  }

  _handlePauseSelection() {
    audio.playSound('menuConfirm');
    switch(this.pauseOption) {
      case 0: this.state = STATE.PLAYING; break;
      case 1: this._restartGame(); this.state = STATE.PLAYING; break;
      case 2: this._goToMenu(); break;
    }
  }

  _addScreenShake(intensity) {
    this.screenShakeX = Math.max(this.screenShakeX, intensity);
    this.screenShakeY = Math.max(this.screenShakeY, intensity);
  }

  _saveHighScore() {
    const entry = { score: Math.floor(this.score), date: new Date().toLocaleDateString() };
    this.highScores.push(entry);
    this.highScores.sort((a,b) => b.score - a.score);
    this.highScores = this.highScores.slice(0, 10);
    try { localStorage.setItem('ss_highscores', JSON.stringify(this.highScores)); } catch(e) {}
  }

  _loadHighScores() {
    try {
      const data = localStorage.getItem('ss_highscores');
      return data ? JSON.parse(data) : [];
    } catch(e) { return []; }
  }

  _isNewHighScore() {
    if (this.highScores.length === 0) return true;
    return Math.floor(this.score) > (this.highScores[0]?.score || 0);
  }
}

// ================================================================
// LAUNCH GAME
// ================================================================
const game = new Game();
game.start();

// Mute toggle
window.addEventListener('keydown', e => {
  if (e.code === 'KeyM') {
    audio.toggleMute();
  }
});

</script>
