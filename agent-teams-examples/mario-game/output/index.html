<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pixel Quest</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  width: 100vw;
}
canvas {
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  touch-action: none;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ========== CONSTANTS & CONFIG ==========
// (engine-core.js begins)

// ===== CORE ENGINE (Sections 1, 2, 3, 7, 8, 9, 18) =====

// ========== SECTION 1: CONSTANTS & CONFIG ==========

const TILE_SIZE       = 32;
const CANVAS_WIDTH    = 960;
const CANVAS_HEIGHT   = 640;
const GRAVITY         = 0.65;
const MAX_FALL_SPEED  = 14;
const PLAYER_SPEED    = 4;
const JUMP_VELOCITY   = -14;
const INVINCIBILITY_FRAMES = 90;
const POWERUP_DURATION     = 600;
const DOUBLE_JUMP_VEL      = -9;
const MAX_LIVES            = 3;
const STOMP_BOUNCE         = -7;

const TILE = {
  AIR:               0,
  DIRT:              1,
  STONE:             2,
  CLOUD:             3,
  BRICK:             4,
  PLATFORM:          5,
  SPIKE:             6,
  CHECKPOINT_FLAG:   7,
  EXIT_FLAG:         8,
  PIT:               9,
  DECO_GRASS:        10,
  DECO_STALACTITE:   11,
  DECO_STAR:         12,
  DECO_TORCH:        13,
};

const SOLID_TILES     = new Set([TILE.DIRT, TILE.STONE, TILE.CLOUD, TILE.BRICK]);
const HAZARD_TILES    = new Set([TILE.SPIKE, TILE.PIT]);
const PLATFORM_SET    = new Set([TILE.PLATFORM]);
const PASSABLE_SET    = new Set([TILE.AIR, TILE.DECO_GRASS, TILE.DECO_STALACTITE, TILE.DECO_STAR, TILE.DECO_TORCH]);
const TRIGGER_TILES   = new Set([TILE.CHECKPOINT_FLAG, TILE.EXIT_FLAG]);

const STATE = { TITLE: 0, PLAYING: 1, PAUSED: 2, LEVEL_COMPLETE: 3, GAME_OVER: 4, VICTORY: 5 };
const THEME = { GRASSLAND: 1, UNDERGROUND: 2, SKY: 3, CASTLE: 4 };

// ========== GLOBAL MUTABLE STATE (Section 11.1) ==========

let canvas, ctx;
let gameState       = STATE.TITLE;
let currentLevel    = 0;
let level           = null;

let player = {
  x: 0, y: 0,
  vx: 0, vy: 0,
  width: 28,
  height: 32,
  speed: PLAYER_SPEED,
  jumpForce: JUMP_VELOCITY,
  gravity: GRAVITY,
  onGround: false,
  facing: 1,
  alive: true,
  state: "idle",
  lives: MAX_LIVES,
  score: 0,
  coins: 0,
  powerups: {
    speed: false,
    invincible: false,
    doubleJump: false,
  },
  powerupTimers: {
    speed: 0,
    invincible: 0,
  },
  canDoubleJump: false,
  hasDoubleJumped: false,
  invincibleTimer: 0,
  animFrame: 0,
  animTimer: 0,
  lastCheckpoint: null,
  deathTimer: 0,
};

let camera = {
  x: 0, y: 0,
  width: CANVAS_WIDTH,
  height: CANVAS_HEIGHT,
  targetX: 0, targetY: 0,
  lerpSpeed: 0.08,
};

let enemies           = [];
let boss              = null;
let coins             = [];
let powerupItems      = [];
let projectiles       = [];
let particles         = [];
let keys              = {};
let touches           = {};
let activatedCheckpoints = new Set();
let transitionCooldown = 0;
let audioCtx          = null;
let soundBuffers      = {};
let bossMusicNode     = null;
let lastTime          = 0;
let globalFrame       = 0;
let bestScore         = 0;
let isMobile          = false;
let jumpWasPressed    = false;
let victorySaved      = false;

const LS_BEST_SCORE = 'pixelquest_best';

// ========== SECTION 2: CANVAS SETUP ==========

function initCanvas() {
  canvas = document.getElementById('game');
  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.id = 'game';
    document.body.appendChild(canvas);
  }
  canvas.width = CANVAS_WIDTH;
  canvas.height = CANVAS_HEIGHT;
  canvas.style.imageRendering = 'pixelated';
  canvas.style.touchAction = 'none';
  ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  resizeCanvas();
}

function resizeCanvas() {
  const maxW = window.innerWidth;
  const maxH = window.innerHeight;
  const ratio = CANVAS_WIDTH / CANVAS_HEIGHT;
  let displayW, displayH;
  if (maxW / maxH > ratio) {
    displayH = maxH;
    displayW = maxH * ratio;
  } else {
    displayW = maxW;
    displayH = maxW / ratio;
  }
  canvas.style.width  = Math.floor(displayW) + 'px';
  canvas.style.height = Math.floor(displayH) + 'px';
}

// ========== SECTION 3: INPUT HANDLING ==========

function setupInput() {
  isMobile = 'ontouchstart' in window;

  window.addEventListener('keydown', handleKeyDown);
  window.addEventListener('keyup', handleKeyUp);

  if (isMobile) {
    canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
    canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
    canvas.addEventListener('touchend', handleTouchEnd);
    canvas.addEventListener('touchcancel', handleTouchEnd);
  }

  window.addEventListener('resize', resizeCanvas);
}

function handleKeyDown(e) {
  keys[e.code] = true;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowDown') {
    e.preventDefault();
  }
}

function handleKeyUp(e) {
  keys[e.code] = false;
}

function getTouchZones() {
  const scaleX = CANVAS_WIDTH / (parseFloat(canvas.style.width) || CANVAS_WIDTH);
  const scaleY = CANVAS_HEIGHT / (parseFloat(canvas.style.height) || CANVAS_HEIGHT);
  return {
    left:  { x: 10,               y: CANVAS_HEIGHT - 150, w: 80, h: 80, scaleX, scaleY },
    right: { x: 110,              y: CANVAS_HEIGHT - 150, w: 80, h: 80, scaleX, scaleY },
    jump:  { x: CANVAS_WIDTH - 150, y: CANVAS_HEIGHT - 170, w: 120, h: 120, scaleX, scaleY },
  };
}

function moveEventToCanvas(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0] || e.changedTouches[0];
  if (!touch) return null;
  return {
    x: (touch.clientX - rect.left) * (CANVAS_WIDTH / rect.width),
    y: (touch.clientY - rect.top) * (CANVAS_HEIGHT / rect.height),
  };
}

function isPointInZone(px, py, zone) {
  return px >= zone.x && px <= zone.x + zone.w && py >= zone.y && py <= zone.y + zone.h;
}

function handleTouchStart(e) {
  e.preventDefault();
  const point = moveEventToCanvas(e);
  if (!point) return;
  const zones = getTouchZones();
  if (isPointInZone(point.x, point.y, zones.left))  { touches.left = true; touches.right = false; }
  if (isPointInZone(point.x, point.y, zones.right)) { touches.right = true; touches.left = false; }
  if (isPointInZone(point.x, point.y, zones.jump))  { touches.jump = true; }
}

function handleTouchMove(e) {
  e.preventDefault();
  const point = moveEventToCanvas(e);
  if (!point) return;
  const zones = getTouchZones();
  touches.left = false;
  touches.right = false;
  touches.jump = false;
  if (isPointInZone(point.x, point.y, zones.left))  touches.left = true;
  if (isPointInZone(point.x, point.y, zones.right)) touches.right = true;
  if (isPointInZone(point.x, point.y, zones.jump))  touches.jump = true;
}

function handleTouchEnd(e) {
  e.preventDefault();
  touches.left = false;
  touches.right = false;
  touches.jump = false;
}

function isPressed(action) {
  switch (action) {
    case 'left':  return keys['ArrowLeft'] || keys['KeyA'] || touches.left;
    case 'right': return keys['ArrowRight'] || keys['KeyD'] || touches.right;
    case 'jump':  return keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || touches.jump;
    default:      return false;
  }
}

function processInput() {
  if (!player.alive) { player.vx = 0; return; }

  player.vx = 0;
  if (isPressed('left'))  player.vx = -player.speed;
  if (isPressed('right')) player.vx = player.speed;

  const jumpNow = isPressed('jump');
  if (jumpNow && !jumpWasPressed) {
    if (player.onGround) {
      player.vy = player.jumpForce;
      player.onGround = false;
      if (typeof playSound === 'function') playSound('jump');
    } else if (player.canDoubleJump && !player.hasDoubleJumped) {
      player.vy = DOUBLE_JUMP_VEL;
      player.hasDoubleJumped = true;
      if (typeof playSound === 'function') playSound('doubleJump');
    }
  }
  jumpWasPressed = jumpNow;
}

function handleInput() {
  if (transitionCooldown > 0) {
    transitionCooldown--;
  }

  const enterOrSpace = keys['Enter'] || keys['Space'];
  const tapCheck = enterOrSpace || (isMobile && Object.keys(touches).length > 0);

  switch (gameState) {
    case STATE.TITLE:
      if (tapCheck && transitionCooldown <= 0) {
        player.score = 0;
        player.lives = MAX_LIVES;
        player.coins = 0;
        victorySaved = false;
        loadLevel(0);
        transitionCooldown = 30;
      }
      break;

    case STATE.PLAYING:
      if ((keys['KeyP'] || keys['Escape']) && transitionCooldown <= 0) {
        gameState = STATE.PAUSED;
        transitionCooldown = 30;
        keys['KeyP'] = false;
        keys['Escape'] = false;
      }
      if (keys['KeyR']) {
        player.score = 0;
        player.lives = MAX_LIVES;
        victorySaved = false;
        gameState = STATE.TITLE;
        transitionCooldown = 30;
        keys['KeyR'] = false;
        if (typeof stopBossMusic === 'function') stopBossMusic();
      }
      break;

    case STATE.PAUSED:
      if ((keys['KeyP'] || keys['Escape']) && transitionCooldown <= 0) {
        gameState = STATE.PLAYING;
        transitionCooldown = 30;
        keys['KeyP'] = false;
        keys['Escape'] = false;
      }
      if (keys['KeyR']) {
        player.score = 0;
        player.lives = MAX_LIVES;
        victorySaved = false;
        gameState = STATE.TITLE;
        transitionCooldown = 30;
        keys['KeyR'] = false;
        if (typeof stopBossMusic === 'function') stopBossMusic();
      }
      break;

    case STATE.LEVEL_COMPLETE:
      if (tapCheck && transitionCooldown <= 0) {
        if (typeof nextLevel === 'function') nextLevel();
        else loadLevel(currentLevel + 1);
        transitionCooldown = 30;
      }
      break;

    case STATE.GAME_OVER:
      if (tapCheck && transitionCooldown <= 0) {
        player.score = 0;
        player.lives = MAX_LIVES;
        player.coins = 0;
        victorySaved = false;
        gameState = STATE.TITLE;
        transitionCooldown = 30;
      }
      break;

    case STATE.VICTORY:
      if (tapCheck && transitionCooldown <= 0) {
        player.score = 0;
        player.lives = MAX_LIVES;
        player.coins = 0;
        victorySaved = false;
        gameState = STATE.TITLE;
        transitionCooldown = 30;
      }
      break;
  }
}


// ========== SECTION 7: GAME STATE & PLAYER STATE ==========

function initPlayer() {
  player.x = 0;
  player.y = 0;
  player.vx = 0;
  player.vy = 0;
  player.width = 28;
  player.height = 32;
  player.speed = PLAYER_SPEED;
  player.jumpForce = JUMP_VELOCITY;
  player.gravity = GRAVITY;
  player.onGround = false;
  player.facing = 1;
  player.alive = true;
  player.state = "idle";
  player.lives = MAX_LIVES;
  player.score = 0;
  player.coins = 0;
  player.powerups = { speed: false, invincible: false, doubleJump: false };
  player.powerupTimers = { speed: 0, invincible: 0 };
  player.canDoubleJump = false;
  player.hasDoubleJumped = false;
  player.invincibleTimer = 0;
  player.animFrame = 0;
  player.animTimer = 0;
  player.lastCheckpoint = null;
  player.deathTimer = 0;
}

function resetGame() {
  player.score = 0;
  player.lives = MAX_LIVES;
  player.coins = 0;
  gameState = STATE.TITLE;
}

function loadBestScore() {
  try {
    const stored = localStorage.getItem(LS_BEST_SCORE);
    bestScore = stored ? parseInt(stored, 10) : 0;
  } catch (e) {
    bestScore = 0;
  }
  return bestScore;
}

function saveBestScore(score) {
  if (score > bestScore) {
    bestScore = score;
    try {
      localStorage.setItem(LS_BEST_SCORE, String(score));
    } catch (e) {}
  }
}

// ========== SECTION 8: CAMERA SYSTEM ==========

function updateCamera(dt) {
  if (!level) return;

  camera.targetX = player.x + player.width / 2 - camera.width / 2;
  camera.targetY = player.y + player.height / 2 - camera.height / 2;

  camera.x += (camera.targetX - camera.x) * camera.lerpSpeed;
  camera.y += (camera.targetY - camera.y) * camera.lerpSpeed;

  const maxX = level.width * TILE_SIZE - camera.width;
  const maxY = level.height * TILE_SIZE - camera.height;

  if (maxX < 0) camera.x = maxX / 2;
  else camera.x = Math.max(0, Math.min(camera.x, maxX));

  if (maxY < 0) camera.y = maxY / 2;
  else camera.y = Math.max(0, Math.min(camera.y, maxY));
}

function snapCamera() {
  if (!level) return;

  camera.x = player.x + player.width / 2 - camera.width / 2;
  camera.y = player.y + player.height / 2 - camera.height / 2;

  const maxX = level.width * TILE_SIZE - camera.width;
  const maxY = level.height * TILE_SIZE - camera.height;

  camera.x = Math.max(0, Math.min(camera.x, maxX));
  camera.y = Math.max(0, Math.min(camera.y, maxY));

  if (maxX < 0) camera.x = maxX / 2;
  if (maxY < 0) camera.y = maxY / 2;

  camera.targetX = camera.x;
  camera.targetY = camera.y;
}

function isOnScreen(entity) {
  return (
    entity.x + entity.width > camera.x &&
    entity.x < camera.x + camera.width &&
    entity.y + entity.height > camera.y &&
    entity.y < camera.y + camera.height
  );
}

function worldToScreen(worldX, worldY) {
  return {
    x: Math.round(worldX - camera.x),
    y: Math.round(worldY - camera.y),
  };
}

// ========== SECTION 9: COLLISION SYSTEM ==========

function rectsOverlap(a, b) {
  return (
    a.x < b.x + b.width &&
    a.x + a.width > b.x &&
    a.y < b.y + b.height &&
    a.y + a.height > b.y
  );
}

function getTouchingTiles(entity) {
  const tiles = [];
  if (!level) return tiles;

  const startCol = Math.floor(entity.x / TILE_SIZE);
  const endCol   = Math.floor((entity.x + entity.width - 0.01) / TILE_SIZE);
  const startRow = Math.floor(entity.y / TILE_SIZE);
  const endRow   = Math.floor((entity.y + entity.height - 0.01) / TILE_SIZE);

  for (let row = startRow; row <= endRow; row++) {
    for (let col = startCol; col <= endCol; col++) {
      if (row >= 0 && row < level.height && col >= 0 && col < level.width) {
        const tileType = level.tiles[row][col];
        tiles.push({ col, row, type: tileType });
      }
    }
  }
  return tiles;
}

function resolvePlayerTileCollision(player, dt) {
  if (!level) return;
  const dtNorm = dt / 16.667;

  // --- PHASE 1: HORIZONTAL ---
  player.x += player.vx * dtNorm;

  const hTiles = getTouchingTiles(player);
  for (const tile of hTiles) {
    if (SOLID_TILES.has(tile.type)) {
      if (player.vx > 0) {
        player.x = tile.col * TILE_SIZE - player.width;
      } else if (player.vx < 0) {
        player.x = (tile.col + 1) * TILE_SIZE;
      }
      player.vx = 0;
    }
  }

  // --- PHASE 2: VERTICAL ---
  const prevBottom = player.y + player.height;
  player.y += player.vy * dtNorm;

  const vTiles = getTouchingTiles(player);
  player.onGround = false;

  for (const tile of vTiles) {
    if (SOLID_TILES.has(tile.type)) {
      if (player.vy > 0) {
        player.y = tile.row * TILE_SIZE - player.height;
        player.vy = 0;
        player.onGround = true;
        player.canDoubleJump = player.powerups.doubleJump;
        player.hasDoubleJumped = false;
      } else if (player.vy < 0) {
        player.y = (tile.row + 1) * TILE_SIZE;
        player.vy = 0;
      }
    }

    if (PLATFORM_SET.has(tile.type)) {
      if (player.vy >= 0 && prevBottom <= tile.row * TILE_SIZE + 2) {
        player.y = tile.row * TILE_SIZE - player.height;
        player.vy = 0;
        player.onGround = true;
        player.canDoubleJump = player.powerups.doubleJump;
        player.hasDoubleJumped = false;
      }
    }
  }

  // Fall off bottom of level
  if (player.y > level.height * TILE_SIZE + 64) {
    killPlayer();
  }

  // Clamp to level bounds
  player.x = Math.max(0, Math.min(player.x, level.width * TILE_SIZE - player.width));
}

function resolveEnemyTileCollision(enemy, dt) {
  if (!level) return;

  if (enemy.type === 'ghost') return;

  const dtNorm = dt / 16.667;

  // Horizontal
  enemy.x += enemy.vx * dtNorm;
  const hTiles = getTouchingTiles(enemy);
  for (const tile of hTiles) {
    if (SOLID_TILES.has(tile.type)) {
      if (enemy.vx > 0) {
        enemy.x = tile.col * TILE_SIZE - enemy.width;
      } else if (enemy.vx < 0) {
        enemy.x = (tile.col + 1) * TILE_SIZE;
      }
      enemy.vx = -enemy.vx;
    }
  }

  // Vertical
  enemy.y += enemy.vy * dtNorm;
  const vTiles = getTouchingTiles(enemy);
  for (const tile of vTiles) {
    if (SOLID_TILES.has(tile.type)) {
      if (enemy.vy > 0) {
        enemy.y = tile.row * TILE_SIZE - enemy.height;
        enemy.vy = 0;
      } else if (enemy.vy < 0) {
        enemy.y = (tile.row + 1) * TILE_SIZE;
        enemy.vy = 0;
      }
    }
  }

  // Fall off level
  if (enemy.y > level.height * TILE_SIZE + 64) {
    enemy.alive = false;
  }
}

function checkPlayerEnemyCollisions() {
  if (!player.alive) return;

  const playerPrevBottom = player.y + player.height - player.vy;

  for (const enemy of enemies) {
    if (!enemy.alive) continue;

    if (rectsOverlap(player, enemy)) {
      const isStomp = player.vy > 0 &&
        playerPrevBottom <= enemy.y + enemy.height * 0.5;

      if (enemy.type === 'ghost') {
        if (player.powerups.invincible || player.invincibleTimer > 0) {
          // nothing
        } else {
          hurtPlayer();
        }
        continue;
      }

      if (isStomp) {
        player.vy = STOMP_BOUNCE;
        if (typeof killEnemy === 'function') killEnemy(enemy);
        if (typeof spawnParticles === 'function') {
          spawnParticles(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, 8, '#FFF');
        }
        if (typeof playSound === 'function') playSound('stomp');
      } else if (player.powerups.invincible || player.invincibleTimer > 0) {
        // nothing
      } else {
        hurtPlayer();
      }
    }
  }

  // Separate boss collision check
  if (boss && boss.alive && rectsOverlap(player, boss)) {
    const isStomp = player.vy > 0 &&
      playerPrevBottom <= boss.y + boss.height * 0.5;

    if (isStomp) {
      if (typeof damageBoss === 'function') damageBoss();
      player.vy = STOMP_BOUNCE;
    } else if (!player.powerups.invincible && player.invincibleTimer <= 0) {
      hurtPlayer();
    }
  }
}

function checkPlayerCollectibleCollisions() {
  if (!player.alive) return;

  for (const coin of coins) {
    if (!coin.alive) continue;
    if (rectsOverlap(player, coin)) {
      coin.alive = false;
      player.score += coin.value;
      player.coins++;
      if (typeof playSound === 'function') playSound('coin');
    }
  }

  for (const pu of powerupItems) {
    if (!pu.alive) continue;
    if (rectsOverlap(player, pu)) {
      pu.alive = false;
      activatePowerup(pu.type);
      if (typeof playSound === 'function') playSound('powerup');
    }
  }
}

function checkPlayerHazardCollisions() {
  if (!player.alive) return;
  if (player.powerups.invincible || player.invincibleTimer > 0) return;

  const touching = getTouchingTiles(player);
  for (const tile of touching) {
    if (HAZARD_TILES.has(tile.type)) {
      hurtPlayer();
      return;
    }
  }
}

function checkPlayerExitCollision() {
  if (!player.alive || !level) return;
  if (transitionCooldown > 0) return;
  if (!level.exit) return;

  const exitRect = {
    x: level.exit.col * TILE_SIZE,
    y: level.exit.row * TILE_SIZE,
    width: TILE_SIZE,
    height: TILE_SIZE,
  };

  if (rectsOverlap(player, exitRect)) {
    transitionCooldown = 60;
    if (currentLevel < 3) {
      gameState = STATE.LEVEL_COMPLETE;
      if (typeof playSound === 'function') playSound('levelComplete');
    } else {
      gameState = STATE.VICTORY;
      saveBestScore(player.score);
      if (typeof playSound === 'function') playSound('victory');
    }
  }
}

function checkCheckpointCollision() {
  if (!player.alive || !level) return;

  const touching = getTouchingTiles(player);
  for (const tile of touching) {
    if (tile.type === TILE.CHECKPOINT_FLAG) {
      const key = tile.col + ',' + tile.row;
      if (!activatedCheckpoints.has(key)) {
        activatedCheckpoints.add(key);
        player.lastCheckpoint = { col: tile.col, row: tile.row };
        if (typeof playSound === 'function') playSound('checkpoint');
      }
    }
  }
}

function checkPlayerProjectileCollisions() {
  if (!player.alive) return;
  if (player.powerups.invincible || player.invincibleTimer > 0) return;

  for (const proj of projectiles) {
    if (!proj.alive) continue;
    if (rectsOverlap(player, proj)) {
      proj.alive = false;
      hurtPlayer();
      return;
    }
  }
}

// ========== SECTION 18: GAME LOOP & MAIN ==========

function init() {
  initCanvas();
  setupInput();
  loadBestScore();
  resetGame();
  if (typeof initAudio === 'function') initAudio();
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

function gameLoop(timestamp) {
  const rawDt = timestamp - lastTime;
  const dt = Math.min(rawDt, 33.33);
  lastTime = timestamp;
  globalFrame++;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

function update(dt) {
  handleInput();

  if (gameState === STATE.PLAYING) {
    processInput();

    if (typeof updatePlayer === 'function') updatePlayer(dt);
    if (typeof updatePlayerAnimation === 'function') updatePlayerAnimation(dt);
    updateCamera(dt);

}

// ========== SECTION 4: AUDIO SYSTEM ==========

var bossMusicGain = null;

function initAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch (e) {
    console.warn('Web Audio API not available');
    return;
  }

  soundBuffers.jump    = createToneBuffer(audioCtx, [[200, 0.08], [600, 0.08]], 0.16, 'sine');
  soundBuffers.coin    = createToneBuffer(audioCtx, [[523, 0.05], [659, 0.05]], 0.1, 'square');
  soundBuffers.stomp   = createToneBuffer(audioCtx, [[80, 0.12]], 0.12, 'square');
  soundBuffers.hurt    = createNoiseBuffer(audioCtx, 0.15);
  soundBuffers.powerup = createToneBuffer(audioCtx, [[523, 0.08], [659, 0.08], [784, 0.08], [1047, 0.15]], 0.4, 'sine');
  soundBuffers.checkpoint = createToneBuffer(audioCtx, [[523, 0.08], [659, 0.08], [784, 0.15]], 0.3, 'triangle');
  soundBuffers.levelComplete = createToneBuffer(audioCtx, [[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.3]], 0.6, 'triangle');
  soundBuffers.gameOver = createToneBuffer(audioCtx, [[400, 0.2], [300, 0.2], [200, 0.5]], 0.9, 'sawtooth');
  soundBuffers.victory  = createToneBuffer(audioCtx, [[523, 0.15], [659, 0.15], [784, 0.15], [1047, 0.15], [1318, 0.4]], 1.0, 'sine');
  soundBuffers.fireball = createNoiseBuffer(audioCtx, 0.2);
  soundBuffers.bossHit  = createToneBuffer(audioCtx, [[100, 0.15], [60, 0.2]], 0.35, 'sawtooth');
  soundBuffers.doubleJump = createToneBuffer(audioCtx, [[400, 0.06], [800, 0.06]], 0.12, 'sine');
  soundBuffers.extraLife  = createToneBuffer(audioCtx, [[523, 0.08], [659, 0.08], [784, 0.08], [1047, 0.2]], 0.45, 'sine');
  soundBuffers.boneThrow  = createToneBuffer(audioCtx, [[150, 0.1]], 0.1, 'square');
  soundBuffers.charge     = createToneBuffer(audioCtx, [[60, 0.2], [80, 0.2], [100, 0.2]], 0.6, 'sawtooth');
}

function playSound(name) {
  if (!audioCtx || !soundBuffers[name]) return;
  try {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const source = audioCtx.createBufferSource();
    source.buffer = soundBuffers[name];
    source.connect(audioCtx.destination);
    source.start(0);
  } catch (e) {
    // ignore audio errors
  }
}

function createToneBuffer(ctx, segments, totalDuration, waveType) {
  const sampleRate = ctx.sampleRate;
  const length = Math.floor(sampleRate * totalDuration);
  const buffer = ctx.createBuffer(1, length, sampleRate);
  const data = buffer.getChannelData(0);
  let pos = 0;

  for (const seg of segments) {
    const freq = seg[0];
    const dur = seg[1];
    const segLen = Math.floor(sampleRate * dur);
    for (let i = 0; i < segLen && pos < length; i++, pos++) {
      const t = i / sampleRate;
      let sample = 0;
      switch (waveType) {
        case 'sine':     sample = Math.sin(2 * Math.PI * freq * t); break;
        case 'square':   sample = Math.sin(2 * Math.PI * freq * t) > 0 ? 0.5 : -0.5; break;
        case 'triangle': sample = 2 * Math.abs(2 * (t * freq - Math.floor(t * freq + 0.5))) - 0.5; break;
        case 'sawtooth': sample = 2 * (t * freq - Math.floor(t * freq)) - 1; break;
        default: sample = Math.sin(2 * Math.PI * freq * t); break;
      }
      const envPos = pos / length;
      const env = Math.min(envPos * 10, 1) * Math.max(0, 1 - (envPos - 0.7) * 3.33);
      data[pos] = sample * env * 0.3;
    }
  }
  return buffer;
}

function createNoiseBuffer(ctx, duration) {
  const sampleRate = ctx.sampleRate;
  const length = Math.floor(sampleRate * duration);
  const buffer = ctx.createBuffer(1, length, sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < length; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.3 * Math.max(0, 1 - i / length);
  }
  return buffer;
}

function startBossMusic() {
  if (!audioCtx) return;
  stopBossMusic();

  bossMusicNode = audioCtx.createOscillator();
  bossMusicGain = audioCtx.createGain();
  bossMusicGain.gain.value = 0.08;
  bossMusicNode.type = 'sawtooth';
  bossMusicNode.frequency.value = 110;
  bossMusicNode.connect(bossMusicGain);
  bossMusicGain.connect(audioCtx.destination);

  // Create a slow tremolo by modulating frequency with an LFO
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.frequency.value = 3;
  lfoGain.gain.value = 20;
  lfo.connect(lfoGain);
  lfoGain.connect(bossMusicNode.frequency);
  lfo.start();
  bossMusicNode._lfo = lfo;
  bossMusicNode._lfoGain = lfoGain;

  bossMusicNode.start();
}

function stopBossMusic() {
  if (bossMusicNode) {
    try {
      if (bossMusicNode._lfo) {
        bossMusicNode._lfo.stop();
        bossMusicNode._lfo.disconnect();
      }
      if (bossMusicNode._lfoGain) {
        bossMusicNode._lfoGain.disconnect();
      }
      bossMusicNode.stop();
      bossMusicNode.disconnect();
      if (bossMusicGain) bossMusicGain.disconnect();
    } catch (e) { /* ignore */ }
    bossMusicNode = null;
    bossMusicGain = null;
  }
}


// ========== SECTION 5: SPRITE DRAWING ==========

// -- Player Sprite --
function drawPlayerSprite(ctx, x, y, w, h, facing, frame, state, invincible, flashOn) {
  ctx.save();

  if (invincible && flashOn) {
    ctx.globalAlpha = 0.5;
  }

  var cx = x + w / 2;
  var cy = y + h / 2;

  if (invincible) {
    var hue = (Date.now() / 5) % 360;
    ctx.fillStyle = 'hsl(' + hue + ', 80%, 50%)';
  } else {
    ctx.fillStyle = '#3366FF';
  }

  var bodyY = y + h * 0.28;
  var bodyH = h * 0.55;
  var bodyW = w - 6;

  // Body
  ctx.fillRect(x + 3, bodyY, bodyW, bodyH);

  if (state === 'dead') {
    ctx.strokeStyle = '#FF4444';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x + 4, y + 4);
    ctx.lineTo(x + w - 4, y + h - 4);
    ctx.moveTo(x + w - 4, y + 4);
    ctx.lineTo(x + 4, y + h - 4);
    ctx.stroke();
    ctx.restore();
    return;
  }

  // Hat
  ctx.fillStyle = '#FF3333';
  ctx.fillRect(x + 4, y + h * 0.08, w - 8, h * 0.2);

  // Eyes
  var eyeSize = 5;
  var eyeY = bodyY + 4;
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(cx - 7 + facing * 2, eyeY, eyeSize, eyeSize);
  ctx.fillRect(cx + 2 + facing * 2, eyeY, eyeSize, eyeSize);
  ctx.fillStyle = '#000000';
  ctx.fillRect(cx - 5 + facing * 2 + 1, eyeY + 1, 2, 2);
  ctx.fillRect(cx + 4 + facing * 2 + 1, eyeY + 1, 2, 2);

  // Legs/shoes
  var shoeH = 4;
  var legsColor = invincible ? ctx.fillStyle : '#222255';
  ctx.fillStyle = legsColor;
  var legBaseY = bodyY + bodyH;
  if (state === 'jump' || state === 'fall') {
    ctx.fillRect(x + 5, legBaseY, 6, shoeH);
    ctx.fillRect(x + w - 11, legBaseY, 6, shoeH);
  } else if (state === 'walk') {
    var wf = frame % 4;
    var lo = [[0, 3], [3, 0], [3, 0], [0, 3]];
    ctx.fillRect(x + 5, legBaseY + lo[wf][0], 6, shoeH + 3 - lo[wf][0]);
    ctx.fillRect(x + w - 11, legBaseY + lo[wf][1], 6, shoeH + 3 - lo[wf][1]);
  } else {
    ctx.fillRect(x + 5, legBaseY, 6, shoeH + 2);
    ctx.fillRect(x + w - 11, legBaseY, 6, shoeH + 2);
  }

  ctx.restore();
}

// -- Slime Sprite --
function drawSlimeSprite(ctx, x, y, w, h, frame) {
  const squish = (frame % 2 === 0) ? 1 : 0;
  const hMod = h - squish * 3;
  const wMod = w + squish * 3;

  ctx.save();
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(x + w / 2, y + h - 3, w * 0.4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body - green blob wider at bottom
  ctx.fillStyle = '#44CC44';
  ctx.beginPath();
  ctx.moveTo(x + wMod * 0.25, y + hMod);
  ctx.quadraticCurveTo(x, y + hMod * 0.5, x + wMod * 0.15, y + hMod * 0.3);
  ctx.quadraticCurveTo(x + wMod * 0.05, y, x + wMod * 0.5, y);
  ctx.quadraticCurveTo(x + wMod * 0.95, y, x + wMod * 0.85, y + hMod * 0.3);
  ctx.quadraticCurveTo(x + wMod, y + hMod * 0.5, x + wMod * 0.75, y + hMod);
  ctx.closePath();
  ctx.fill();

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.ellipse(x + w * 0.35, y + h * 0.35, w * 0.2, h * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.arc(x + w * 0.3, y + h * 0.35, w * 0.12, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + w * 0.7, y + h * 0.35, w * 0.12, 0, Math.PI * 2);
  ctx.fill();

  // Pupils
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(x + w * 0.3, y + h * 0.36, w * 0.06, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + w * 0.7, y + h * 0.36, w * 0.06, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// -- Bat Sprite --
function drawBatSprite(ctx, x, y, w, h, frame) {
  ctx.save();

  // Body
  ctx.fillStyle = '#8844CC';
  ctx.beginPath();
  ctx.ellipse(x + w / 2, y + h / 2, w * 0.2, h * 0.25, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wings - flap based on frame
  const wingPhase = frame % 4;
  let wingAngleUp, wingAngleDown;
  if (wingPhase === 0) { wingAngleUp = -0.4; wingAngleDown = 0.5; }
  else if (wingPhase === 1) { wingAngleUp = -0.1; wingAngleDown = 0.2; }
  else if (wingPhase === 2) { wingAngleUp = -0.4; wingAngleDown = 0.5; }
  else { wingAngleUp = -0.7; wingAngleDown = 0.8; }

  ctx.fillStyle = '#7733AA';
  // Left wing
  ctx.beginPath();
  ctx.moveTo(x + w / 2 - w * 0.15, y + h / 2 - h * 0.1);
  ctx.lineTo(x, y + h * 0.15 + wingAngleUp * h * 0.4);
  ctx.lineTo(x + w * 0.05, y + h * 0.3);
  ctx.lineTo(x, y + h * 0.5 + wingAngleDown * h * 0.4);
  ctx.lineTo(x + w / 2 - w * 0.15, y + h / 2 + h * 0.1);
  ctx.closePath();
  ctx.fill();

  // Right wing
  ctx.beginPath();
  ctx.moveTo(x + w / 2 + w * 0.15, y + h / 2 - h * 0.1);
  ctx.lineTo(x + w, y + h * 0.15 + wingAngleUp * h * 0.4);
  ctx.lineTo(x + w - w * 0.05, y + h * 0.3);
  ctx.lineTo(x + w, y + h * 0.5 + wingAngleDown * h * 0.4);
  ctx.lineTo(x + w / 2 + w * 0.15, y + h / 2 + h * 0.1);
  ctx.closePath();
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#FF4444';
  ctx.beginPath();
  ctx.arc(x + w * 0.38, y + h * 0.4, w * 0.06, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + w * 0.62, y + h * 0.4, w * 0.06, 0, Math.PI * 2);
  ctx.fill();

  // Ear points
  ctx.fillStyle = '#8844CC';
  ctx.beginPath();
  ctx.moveTo(x + w * 0.42, y + h * 0.2);
  ctx.lineTo(x + w * 0.35, y);
  ctx.lineTo(x + w * 0.48, y + h * 0.2);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + w * 0.58, y + h * 0.2);
  ctx.lineTo(x + w * 0.65, y);
  ctx.lineTo(x + w * 0.52, y + h * 0.2);
  ctx.fill();

  ctx.restore();
}

// -- Skeleton Sprite --
function drawSkeletonSprite(ctx, x, y, w, h, frame) {
  ctx.save();

  // Skull
  ctx.fillStyle = '#DDD';
  ctx.beginPath();
  ctx.arc(x + w / 2, y + h * 0.15, w * 0.22, 0, Math.PI * 2);
  ctx.fill();

  // Skull outline
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(x + w / 2, y + h * 0.15, w * 0.22, 0, Math.PI * 2);
  ctx.stroke();

  // Eye sockets
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(x + w * 0.4, y + h * 0.13, w * 0.06, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + w * 0.6, y + h * 0.13, w * 0.06, 0, Math.PI * 2);
  ctx.fill();

  // Nose hole
  ctx.beginPath();
  ctx.moveTo(x + w * 0.48, y + h * 0.18);
  ctx.lineTo(x + w * 0.5, y + h * 0.21);
  ctx.lineTo(x + w * 0.52, y + h * 0.18);
  ctx.fill();

  // Jaw
  ctx.fillStyle = '#CCC';
  ctx.fillRect(x + w * 0.32, y + h * 0.22, w * 0.36, h * 0.08);

  // Spine
  ctx.fillStyle = '#BBB';
  const spine = h * 0.12;
  ctx.fillRect(x + w / 2 - 2, y + h * 0.28, 4, h * 0.12);

  // Ribs
  const ribY = y + h * 0.35;
  ctx.strokeStyle = '#BBB';
  ctx.lineWidth = 2;
  for (let i = 0; i < 3; i++) {
    const ribOffset = i * h * 0.08;
    ctx.beginPath();
    ctx.moveTo(x + w / 2, ribY + ribOffset);
    ctx.lineTo(x + w * 0.25, ribY + ribOffset + h * 0.02);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + w / 2, ribY + ribOffset);
    ctx.lineTo(x + w * 0.75, ribY + ribOffset + h * 0.02);
    ctx.stroke();
  }

  // Pelvis
  ctx.fillStyle = '#CCC';
  ctx.fillRect(x + w * 0.3, y + h * 0.55, w * 0.4, h * 0.08);

  // Arms
  const armTop = y + h * 0.32;
  const armLen = h * 0.25;
  const armOffset = frame % 4 < 2 ? -1 : 1;
  ctx.strokeStyle = '#BBB';
  ctx.lineWidth = 3;
  // Left arm
  ctx.beginPath();
  ctx.moveTo(x + w * 0.2, armTop);
  ctx.lineTo(x + w * 0.08, armTop + armLen * 0.6 + armOffset * 3);
  ctx.lineTo(x + w * 0.1, armTop + armLen + armOffset * 3);
  ctx.stroke();
  // Right arm
  ctx.beginPath();
  ctx.moveTo(x + w * 0.8, armTop);
  ctx.lineTo(x + w * 0.92, armTop + armLen * 0.6 - armOffset * 3);
  ctx.lineTo(x + w * 0.9, armTop + armLen - armOffset * 3);
  ctx.stroke();

  // Legs
  const legTop = y + h * 0.62;
  const legLen = h * 0.35;
  const legOffsets = [[0, 0], [4, -4], [0, -2], [-4, 4]];
  const lf = frame % 4;

  ctx.beginPath();
  ctx.moveTo(x + w * 0.35, legTop);
  ctx.lineTo(x + w * 0.3 + legOffsets[lf][0] * 0.5, legTop + legLen * 0.5 + legOffsets[lf][0]);
  ctx.lineTo(x + w * 0.28 + legOffsets[lf][0] * 0.5, legTop + legLen + legOffsets[lf][0]);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x + w * 0.65, legTop);
  ctx.lineTo(x + w * 0.7 - legOffsets[lf][1] * 0.5, legTop + legLen * 0.5 - legOffsets[lf][1]);
  ctx.lineTo(x + w * 0.72 - legOffsets[lf][1] * 0.5, legTop + legLen - legOffsets[lf][1]);
  ctx.stroke();

  ctx.restore();
}

// -- Ghost Sprite --
function drawGhostSprite(ctx, x, y, w, h, frame, opacity) {
  ctx.save();
  ctx.globalAlpha = opacity || 0.7;

  // Body shape
  ctx.fillStyle = 'rgba(200, 200, 255, 1)';

  ctx.beginPath();
  // Rounded top
  ctx.arc(x + w / 2, y + h * 0.3, w * 0.4, Math.PI, 0);
  // Sides
  ctx.lineTo(x + w - w * 0.08, y + h * 0.8);
  // Wavy bottom
  for (var i = 0; i < 4; i++) {
    var waveX = x + w - w * 0.08 - (i * w * 0.23);
    var waveY = y + h * 0.8 + ((i % 2 === 0) ? h * 0.12 : 0);
    ctx.lineTo(waveX - w * 0.12, waveY);
  }
  ctx.lineTo(x + w * 0.08, y + h * 0.8);
  ctx.closePath();
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#334';
  ctx.beginPath();
  ctx.arc(x + w * 0.33, y + h * 0.3, w * 0.08, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + w * 0.67, y + h * 0.3, w * 0.08, 0, Math.PI * 2);
  ctx.fill();

  // Eye highlights
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.arc(x + w * 0.35, y + h * 0.28, w * 0.03, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + w * 0.69, y + h * 0.28, w * 0.03, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  ctx.strokeStyle = '#334';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(x + w / 2, y + h * 0.42, w * 0.12, 0, Math.PI);
  ctx.stroke();

  ctx.restore();
}

// -- Boss Sprite --
function drawBossSprite(ctx, x, y, w, h, phase, frame, flashOn) {
  ctx.save();

  if (flashOn) {
    ctx.globalAlpha = 0.5;
  }

  // Body
  var bodyColor = '#FF4444';
  if (phase === 3) bodyColor = '#FF2222';
  else if (phase === 2) bodyColor = '#FF3333';

  ctx.fillStyle = bodyColor;
  roundRect(ctx, x + w * 0.15, y + h * 0.3, w * 0.7, h * 0.55, 6);
  ctx.fill();

  // Body outline
  ctx.strokeStyle = '#990000';
  ctx.lineWidth = 2;
  roundRect(ctx, x + w * 0.15, y + h * 0.3, w * 0.7, h * 0.55, 6);
  ctx.stroke();

  // Phase 3 cracks
  if (phase === 3) {
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x + w * 0.35, y + h * 0.35);
    ctx.lineTo(x + w * 0.5, y + h * 0.5);
    ctx.lineTo(x + w * 0.45, y + h * 0.65);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + w * 0.65, y + h * 0.4);
    ctx.lineTo(x + w * 0.55, y + h * 0.55);
    ctx.lineTo(x + w * 0.6, y + h * 0.7);
    ctx.stroke();
  }

  // Head
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.arc(x + w / 2, y + h * 0.22, w * 0.22, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#990000';
  ctx.beginPath();
  ctx.arc(x + w / 2, y + h * 0.22, w * 0.22, 0, Math.PI * 2);
  ctx.stroke();

  // Horns - grow with phase
  var hornH = h * (0.15 + phase * 0.06);
  var hornW = w * (0.04 + phase * 0.02);
  ctx.fillStyle = '#CCCCCC';
  ctx.beginPath();
  ctx.moveTo(x + w * 0.38, y + h * 0.15);
  ctx.lineTo(x + w * 0.35, y + h * 0.15 - hornH);
  ctx.lineTo(x + w * 0.42, y + h * 0.15);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + w * 0.62, y + h * 0.15);
  ctx.lineTo(x + w * 0.65, y + h * 0.15 - hornH);
  ctx.lineTo(x + w * 0.58, y + h * 0.15);
  ctx.fill();

  // Eyes
  var eyeColor = phase >= 2 ? '#FFFF00' : '#FFF';
  var eyeGlow = phase >= 2;
  if (eyeGlow) {
    ctx.fillStyle = 'rgba(255,255,0,0.3)';
    ctx.beginPath();
    ctx.arc(x + w * 0.4, y + h * 0.2, w * 0.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + w * 0.6, y + h * 0.2, w * 0.1, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = eyeColor;
  ctx.beginPath();
  ctx.arc(x + w * 0.4, y + h * 0.2, w * 0.06, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + w * 0.6, y + h * 0.2, w * 0.06, 0, Math.PI * 2);
  ctx.fill();

  // Pupils
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(x + w * 0.4, y + h * 0.2, w * 0.03, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + w * 0.6, y + h * 0.2, w * 0.03, 0, Math.PI * 2);
  ctx.fill();

  // Mouth - wider with phase
  var mouthW = w * (0.08 + phase * 0.04);
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(x + w / 2, y + h * 0.28, mouthW, 0, Math.PI);
  ctx.fill();

  // Teeth
  ctx.fillStyle = '#FFF';
  for (var ti = 0; ti < 3; ti++) {
    var tx = x + w / 2 - mouthW + mouthW * 0.3 + ti * mouthW * 0.4;
    ctx.fillRect(tx - 2, y + h * 0.28 - 2, 4, 5);
  }

  // Arms
  var armYOff = (frame % 2 === 0) ? 0 : 3;
  ctx.fillStyle = '#FF3333';
  ctx.beginPath();
  ctx.moveTo(x + w * 0.18, y + h * 0.4);
  ctx.lineTo(x + w * 0.05, y + h * 0.55 + armYOff);
  ctx.lineTo(x + w * 0.1, y + h * 0.6 + armYOff);
  ctx.lineTo(x + w * 0.2, y + h * 0.5);
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(x + w * 0.82, y + h * 0.4);
  ctx.lineTo(x + w * 0.95, y + h * 0.55 - armYOff);
  ctx.lineTo(x + w * 0.9, y + h * 0.6 - armYOff);
  ctx.lineTo(x + w * 0.8, y + h * 0.5);
  ctx.fill();

  // Feet
  ctx.fillStyle = '#CC2222';
  ctx.fillRect(x + w * 0.2, y + h * 0.82, w * 0.25, h * 0.15);
  ctx.fillRect(x + w * 0.55, y + h * 0.82, w * 0.25, h * 0.15);

  ctx.restore();
}

// -- Coin Sprite --
function drawCoinSprite(ctx, x, y, size, frame) {
  ctx.save();
  var cx = x + size / 2;
  var cy = y + size / 2;

  // Spinning animation: width oscillates
  var spinCos = Math.cos(frame * 0.15);
  var scaleX = Math.abs(spinCos);
  var scaleXClip = Math.max(0.15, scaleX);

  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.ellipse(cx, cy, size * 0.4 * scaleXClip, size * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Edge highlight
  ctx.strokeStyle = '#B8860B';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(cx, cy, size * 0.4 * scaleXClip, size * 0.4, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Inner circle
  ctx.strokeStyle = 'rgba(184, 134, 11, 0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(cx, cy, size * 0.28 * scaleXClip, size * 0.28, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Dollar sign or center dot
  ctx.fillStyle = '#B8860B';
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.08, 0, Math.PI * 2);
  ctx.fill();

  // When flat (side-view), draw thin line
  if (scaleXClip < 0.3) {
    ctx.strokeStyle = '#B8860B';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx, y + 2);
    ctx.lineTo(cx, y + size - 2);
    ctx.stroke();
  }

  ctx.restore();
}

// -- Powerup Sprite --
function drawPowerupSprite(ctx, x, y, size, type, frame) {
  ctx.save();
  var cx = x + size / 2;
  var cy = y + size / 2;
  var bob = Math.sin(frame * 0.08) * 3;
  cy += bob;

  // Glow aura
  var glowColor;
  switch (type) {
    case 'speed': glowColor = 'rgba(68, 68, 255, 0.3)'; break;
    case 'invincible': glowColor = 'rgba(255, 0, 255, 0.3)'; break;
    case 'doubleJump': glowColor = 'rgba(255, 255, 255, 0.3)'; break;
    case 'extraLife': glowColor = 'rgba(255, 68, 68, 0.3)'; break;
    default: glowColor = 'rgba(255, 255, 255, 0.3)';
  }
  ctx.fillStyle = glowColor;
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.42, 0, Math.PI * 2);
  ctx.fill();

  // Background circle
  ctx.fillStyle = '#222';
  ctx.strokeStyle = '#FFF';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.35, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  switch (type) {
    case 'speed':
      // Lightning bolt
      ctx.fillStyle = '#4488FF';
      ctx.beginPath();
      ctx.moveTo(cx + size * 0.05, cy - size * 0.25);
      ctx.lineTo(cx - size * 0.08, cy - size * 0.03);
      ctx.lineTo(cx + size * 0.03, cy - size * 0.03);
      ctx.lineTo(cx - size * 0.12, cy + size * 0.25);
      ctx.lineTo(cx + size * 0.05, cy + size * 0.03);
      ctx.lineTo(cx - size * 0.05, cy + size * 0.03);
      ctx.lineTo(cx + size * 0.1, cy - size * 0.25);
      ctx.closePath();
      ctx.fill();
      break;

    case 'invincible':
      // Rainbow star
      var hues = [0, 60, 120, 180, 240, 300];
      var starPoints = 6;
      var outerR = size * 0.28;
      var innerR = size * 0.13;
      for (var s = 0; s < starPoints; s++) {
        ctx.fillStyle = 'hsl(' + ((frame * 5 + s * 60) % 360) + ', 100%, 50%)';
        ctx.beginPath();
        var a1 = (s / starPoints) * Math.PI * 2 - Math.PI / 2;
        var a2 = ((s + 0.5) / starPoints) * Math.PI * 2 - Math.PI / 2;
        var a3 = ((s + 1) / starPoints) * Math.PI * 2 - Math.PI / 2;
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a1) * outerR, cy + Math.sin(a1) * outerR);
        ctx.lineTo(cx + Math.cos(a2) * innerR, cy + Math.sin(a2) * innerR);
        ctx.lineTo(cx + Math.cos(a3) * outerR, cy + Math.sin(a3) * outerR);
        ctx.closePath();
        ctx.fill();
      }
      break;

    case 'doubleJump':
      // Wing/feather shape
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.moveTo(cx - size * 0.05, cy + size * 0.2);
      ctx.quadraticCurveTo(cx - size * 0.25, cy + size * 0.1, cx - size * 0.28, cy);
      ctx.quadraticCurveTo(cx - size * 0.2, cy - size * 0.15, cx - size * 0.05, cy - size * 0.1);
      ctx.quadraticCurveTo(cx + size * 0.1, cy - size * 0.25, cx + size * 0.22, cy - size * 0.1);
      ctx.quadraticCurveTo(cx + size * 0.15, cy + size * 0.1, cx + size * 0.05, cy + size * 0.2);
      ctx.closePath();
      ctx.fill();
      // Feather lines
      ctx.strokeStyle = '#CCC';
      ctx.lineWidth = 0.5;
      for (var fl = 0; fl < 3; fl++) {
        ctx.beginPath();
        ctx.moveTo(cx - size * 0.05, cy + size * 0.1 + fl * 3);
        ctx.lineTo(cx + size * 0.12, cy - size * 0.1 + fl * 5);
        ctx.stroke();
      }
      break;

    case 'extraLife':
      // Heart
      ctx.fillStyle = '#FF4444';
      ctx.beginPath();
      ctx.moveTo(cx, cy + size * 0.2);
      ctx.bezierCurveTo(cx - size * 0.3, cy, cx - size * 0.3, cy - size * 0.25, cx, cy - size * 0.05);
      ctx.bezierCurveTo(cx + size * 0.3, cy - size * 0.25, cx + size * 0.3, cy, cx, cy + size * 0.2);
      ctx.fill();
      // +1 text
      ctx.fillStyle = '#FFF';
      ctx.font = (size * 0.4) + 'px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('+1', cx, cy + size * 0.18);
      break;
  }

  ctx.restore();
}

// -- Tile Drawing --
function drawTile(ctx, type, col, row, sx, sy) {
  var x = sx || 0;
  var y = sy || 0;

  if (x + TILE_SIZE < -TILE_SIZE || x > CANVAS_WIDTH + TILE_SIZE) return;
  if (y + TILE_SIZE < -TILE_SIZE || y > CANVAS_HEIGHT + TILE_SIZE) return;

  ctx.save();

  switch (type) {
    case TILE.DIRT:
      // Brown base
      ctx.fillStyle = '#8B5E3C';
      ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
      // Grid lines
      ctx.strokeStyle = '#6B3E1C';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x + 0.5, y + 0.5, TILE_SIZE - 1, TILE_SIZE - 1);
      ctx.beginPath();
      ctx.moveTo(x + TILE_SIZE / 2, y);
      ctx.lineTo(x + TILE_SIZE / 2, y + TILE_SIZE);
      ctx.moveTo(x, y + TILE_SIZE / 2);
      ctx.lineTo(x + TILE_SIZE, y + TILE_SIZE / 2);
      ctx.stroke();
      // Grass tuft on top if air above
      if (row > 0 && level && level.tiles[row] && level.tiles[row - 1] &&
          PASSABLE_SET.has(level.tiles[row - 1][col])) {
        ctx.fillStyle = '#4CAF50';
        for (var ti = 0; ti < 3; ti++) {
          var tx = x + 8 + ti * 10;
          ctx.fillRect(tx, y - 2, 3, 6 + (ti % 2) * 3);
        }
      }
      break;

    case TILE.STONE:
      ctx.fillStyle = '#808080';
      ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
      // Brick pattern mortar lines
      ctx.strokeStyle = '#606060';
      ctx.lineWidth = 1;
      var isOffsetRow = (row % 2 === 0);
      for (var br = 0; br < TILE_SIZE; br += 8) {
        ctx.beginPath();
        ctx.moveTo(x, y + br);
        ctx.lineTo(x + TILE_SIZE, y + br);
        ctx.stroke();
        if (br % 16 === 0) {
          for (var bc = (isOffsetRow ? 0 : 16); bc < TILE_SIZE; bc += 32) {
            ctx.beginPath();
            ctx.moveTo(x + bc, y + br);
            ctx.lineTo(x + bc, y + br + 8);
            ctx.stroke();
          }
        }
      }
      break;

    case TILE.CLOUD:
      // White fill
      ctx.fillStyle = '#F5F5FF';
      roundRect(ctx, x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4, 6);
      ctx.fill();
      // Faint blue shadow offset
      ctx.fillStyle = 'rgba(180, 200, 220, 0.3)';
      roundRect(ctx, x + 4, y + 4, TILE_SIZE - 4, TILE_SIZE - 4, 6);
      ctx.fill();
      // Main white on top
      ctx.fillStyle = '#F8F8FF';
      roundRect(ctx, x + 1, y + 1, TILE_SIZE - 4, TILE_SIZE - 4, 6);
      ctx.fill();
      break;

    case TILE.BRICK:
      // Dark red base
      ctx.fillStyle = '#8B0000';
      ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
      // Mortar lines
      ctx.strokeStyle = '#4A0000';
      ctx.lineWidth = 1;
      for (var mk = 0; mk < TILE_SIZE; mk += 8) {
        ctx.beginPath();
        ctx.moveTo(x, y + mk);
        ctx.lineTo(x + TILE_SIZE, y + mk);
        ctx.stroke();
      }
      var brickOffsetRow = (row % 2 === 0);
      for (var mb = 0; mb < TILE_SIZE; mb += 16) {
        var offCol = brickOffsetRow ? 0 : 16;
        ctx.beginPath();
        ctx.moveTo(x + offCol, y + mb);
        ctx.lineTo(x + offCol, y + mb + 8);
        ctx.stroke();
        if (offCol > 0) {
          ctx.beginPath();
          ctx.moveTo(x + offCol - 16, y + mb + 8);
          ctx.lineTo(x + offCol - 16 + 16, y + mb + 8);
          ctx.stroke();
        }
      }
      break;

    case TILE.PLATFORM:
      // Thin platform at bottom of tile
      var themeColor = '#8B5E3C'; // default dirt color
      if (level && level.theme === THEME.UNDERGROUND) themeColor = '#808080';
      else if (level && level.theme === THEME.SKY) themeColor = '#F5F5FF';
      else if (level && level.theme === THEME.CASTLE) themeColor = '#8B0000';
      ctx.fillStyle = themeColor;
      ctx.fillRect(x, y + TILE_SIZE - 8, TILE_SIZE, 8);
      // Top highlight
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(x, y + TILE_SIZE - 8, TILE_SIZE, 2);
      break;

    case TILE.SPIKE:
      // Red triangles
      ctx.fillStyle = '#FF0000';
      ctx.beginPath();
      ctx.moveTo(x + 2, y + TILE_SIZE);
      ctx.lineTo(x + TILE_SIZE / 2, y + 4);
      ctx.lineTo(x + TILE_SIZE - 2, y + TILE_SIZE);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(x + 10, y + TILE_SIZE);
      ctx.lineTo(x + TILE_SIZE / 2, y + 14);
      ctx.lineTo(x + TILE_SIZE - 10, y + TILE_SIZE);
      ctx.fill();
      // Outline
      ctx.strokeStyle = '#990000';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + 2, y + TILE_SIZE);
      ctx.lineTo(x + TILE_SIZE / 2, y + 4);
      ctx.lineTo(x + TILE_SIZE - 2, y + TILE_SIZE);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + 10, y + TILE_SIZE);
      ctx.lineTo(x + TILE_SIZE / 2, y + 14);
      ctx.lineTo(x + TILE_SIZE - 10, y + TILE_SIZE);
      ctx.stroke();
      break;

    case TILE.PIT:
      ctx.fillStyle = '#111';
      ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
      // Subtle dark-red dots
      ctx.fillStyle = 'rgba(139, 0, 0, 0.4)';
      for (var pd = 0; pd < 6; pd++) {
        var pdx = x + 4 + ((pd * 7 + 3) % (TILE_SIZE - 8));
        var pdy = y + TILE_SIZE - 6 - ((pd * 3) % 4);
        ctx.fillRect(pdx, pdy, 3, 3);
      }
      break;

    case TILE.CHECKPOINT_FLAG:
      // Draw ground under flag
      var flagColor = '#32CD32'; // default green
      if (level) {
        if (level.theme === THEME.UNDERGROUND) flagColor = '#4488FF';
        else if (level.theme === THEME.SKY) flagColor = '#FFD700';
        else if (level.theme === THEME.CASTLE) flagColor = '#FF4444';
      }
      // Check if activated
      var isActive = activatedCheckpoints && activatedCheckpoints.has(col + ',' + row);

      // Pole
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(x + 5, y + 4, 3, TILE_SIZE - 4);
      // Flag
      ctx.fillStyle = isActive ? flagColor : '#888';
      ctx.beginPath();
      ctx.moveTo(x + 8, y + 6);
      ctx.lineTo(x + TILE_SIZE - 4, y + TILE_SIZE * 0.3);
      ctx.lineTo(x + 8, y + TILE_SIZE * 0.5);
      ctx.closePath();
      ctx.fill();
      // Flag outline
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 0.8;
      ctx.stroke();
      // Pole top knob
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(x + 6.5, y + 6, 3, 0, Math.PI * 2);
      ctx.fill();
      break;

    case TILE.EXIT_FLAG:
      // Larger flag with glow
      var glow = 0.6 + Math.sin(globalFrame * 0.08) * 0.4;
      ctx.fillStyle = 'rgba(255, 215, 0, ' + (glow * 0.3) + ')';
      ctx.beginPath();
      ctx.arc(x + TILE_SIZE / 2, y + TILE_SIZE * 0.3, TILE_SIZE * 0.7, 0, Math.PI * 2);
      ctx.fill();

      // Pole
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(x + 5, y + 4, 3, TILE_SIZE - 4);
      // Flag
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.moveTo(x + 8, y + 6);
      ctx.lineTo(x + TILE_SIZE - 4, y + TILE_SIZE * 0.25);
      ctx.lineTo(x + 8, y + TILE_SIZE * 0.45);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#B8860B';
      ctx.lineWidth = 1;
      ctx.stroke();
      // Star on flag
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.arc(x + TILE_SIZE * 0.45, y + TILE_SIZE * 0.22, 3, 0, Math.PI * 2);
      ctx.fill();
      break;

    case TILE.DECO_GRASS:
      // Small green blade shapes
      ctx.fillStyle = '#32CD32';
      var seed = (col * 31 + row * 17) % 100;
      for (var gi = 0; gi < 3; gi++) {
        var gx = x + 6 + gi * 10;
        var gh = 5 + ((seed + gi * 13) % 6);
        ctx.fillRect(gx, y + TILE_SIZE - gh, 2, gh);
        // Blade tip
        ctx.fillRect(gx - 1, y + TILE_SIZE - gh, 4, 2);
      }
      break;

    case TILE.DECO_STALACTITE:
      // Gray triangle hanging from top
      ctx.fillStyle = '#777';
      ctx.beginPath();
      ctx.moveTo(x + TILE_SIZE * 0.25, y);
      ctx.lineTo(x + TILE_SIZE / 2, y + TILE_SIZE * 0.5);
      ctx.lineTo(x + TILE_SIZE * 0.75, y);
      ctx.fill();
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 0.5;
      ctx.stroke();
      break;

    case TILE.DECO_STAR:
      // 4-point yellow star
      var starFlicker = 1 + Math.sin((globalFrame + col * 10) * 0.1) * 0.3;
      ctx.fillStyle = 'rgba(255, 215, 0, ' + (0.6 * starFlicker) + ')';
      var sx = x + TILE_SIZE / 2;
      var sy = y + TILE_SIZE / 2;
      var sr = 5 * starFlicker;
      ctx.beginPath();
      for (var sp = 0; sp < 8; sp++) {
        var ang = (sp * Math.PI) / 4 - Math.PI / 2;
        var rad = sp % 2 === 0 ? sr : sr * 0.35;
        if (sp === 0) ctx.moveTo(sx + Math.cos(ang) * rad, sy + Math.sin(ang) * rad);
        else ctx.lineTo(sx + Math.cos(ang) * rad, sy + Math.sin(ang) * rad);
      }
      ctx.closePath();
      ctx.fill();
      break;

    case TILE.DECO_TORCH:
      // Wall bracket and flame
      var torchFrame = Math.floor(globalFrame / 5) % 3;
      // Bracket
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(x + TILE_SIZE * 0.4, y + TILE_SIZE * 0.4, TILE_SIZE * 0.5, 4);
      ctx.fillRect(x + TILE_SIZE * 0.3, y + TILE_SIZE * 0.2, 4, TILE_SIZE * 0.3);
      // Flame
      var flameH = [12, 16, 10][torchFrame];
      var flameW = [4, 6, 3][torchFrame];
      ctx.fillStyle = '#FF6600';
      ctx.beginPath();
      ctx.moveTo(x + TILE_SIZE * 0.5 - flameW, y + TILE_SIZE * 0.2);
      ctx.lineTo(x + TILE_SIZE * 0.5, y + TILE_SIZE * 0.2 - flameH);
      ctx.lineTo(x + TILE_SIZE * 0.5 + flameW, y + TILE_SIZE * 0.2);
      ctx.fill();
      // Inner yellow flame
      var flameH2 = flameH * 0.6;
      var flameW2 = flameW * 0.5;
      ctx.fillStyle = '#FFCC00';
      ctx.beginPath();
      ctx.moveTo(x + TILE_SIZE * 0.5 - flameW2, y + TILE_SIZE * 0.2);
      ctx.lineTo(x + TILE_SIZE * 0.5, y + TILE_SIZE * 0.2 - flameH2);
      ctx.lineTo(x + TILE_SIZE * 0.5 + flameW2, y + TILE_SIZE * 0.2);
      ctx.fill();
      // Glow
      ctx.fillStyle = 'rgba(255, 100, 0, 0.15)';
      ctx.beginPath();
      ctx.arc(x + TILE_SIZE * 0.5, y + TILE_SIZE * 0.15, TILE_SIZE * 0.4, 0, Math.PI * 2);
      ctx.fill();
      break;

    default:
      break;
  }

  ctx.restore();
}

// -- Parallax Background Drawing --
function drawParallaxLayer(ctx, layer, scrollOffset) {
  ctx.save();

  var offset = scrollOffset * layer.speed;
  var shape = layer.shape;
  var color = layer.color;

  switch (shape) {
    case 'hills':
      // Sine-wave curves as distant hills
      ctx.fillStyle = color || '#2D5A1E';
      ctx.beginPath();
      ctx.moveTo(0, CANVAS_HEIGHT);
      for (var hx = -20; hx < CANVAS_WIDTH + 40; hx += 4) {
        var hy = CANVAS_HEIGHT * 0.7 + Math.sin((hx + offset) * 0.015) * 40 + Math.sin((hx + offset) * 0.03) * 25;
        ctx.lineTo(hx, hy);
      }
      ctx.lineTo(CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.closePath();
      ctx.fill();

      // Lighter layer on top
      ctx.fillStyle = color ? color : '#3A7A28';
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.moveTo(0, CANVAS_HEIGHT);
      for (var hx2 = -20; hx2 < CANVAS_WIDTH + 40; hx2 += 4) {
        var hy2 = CANVAS_HEIGHT * 0.75 + Math.sin((hx2 + offset + 100) * 0.02) * 30 + Math.sin((hx2 + offset + 100) * 0.04) * 20;
        ctx.lineTo(hx2, hy2);
      }
      ctx.lineTo(CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.closePath();
      ctx.fill();
      break;

    case 'clouds':
      // Rounded rect cloud clusters
      ctx.fillStyle = color || 'rgba(255, 255, 255, 0.4)';
      var cloudCount = Math.floor(CANVAS_WIDTH / 100) + 2;
      for (var ci = 0; ci < cloudCount; ci++) {
        var cx = ((ci * 130 + offset * 0.7) % (CANVAS_WIDTH + 200)) - 100;
        var cy = 40 + (ci * 37) % 100;
        drawCloud(ctx, cx, cy, 30 + (ci % 3) * 10, color);
      }
      break;

    case 'stars':
      // Small white dots that twinkle
      var starCount = 60;
      for (var si = 0; si < starCount; si++) {
        var sxx = ((si * 137 + offset * 0.3) % (CANVAS_WIDTH + 100)) - 50;
        var syy = (si * 71) % (CANVAS_HEIGHT * 0.6);
        var twinkle = 0.4 + Math.sin((globalFrame + si * 17) * 0.05) * 0.4;
        ctx.fillStyle = 'rgba(255, 255, 220, ' + twinkle + ')';
        var sz = 1 + (si % 3);
        ctx.fillRect(sxx, syy, sz, sz);
      }
      break;

    case 'stalactites':
      // Triangles hanging from top
      ctx.fillStyle = color || 'rgba(60, 60, 60, 0.4)';
      var scount = Math.floor(CANVAS_WIDTH / 48) + 2;
      for (var st = 0; st < scount; st++) {
        var stx = ((st * 64 + offset * 0.5) % (CANVAS_WIDTH + 80)) - 40;
        var sth = 30 + (st % 3) * 25;
        var stw = 12 + (st % 4) * 4;
        ctx.beginPath();
        ctx.moveTo(stx - stw, 0);
        ctx.lineTo(stx, sth);
        ctx.lineTo(stx + stw, 0);
        ctx.fill();
      }
      break;

    case 'towers':
      // Tall rectangular structures for castle
      ctx.fillStyle = color || 'rgba(40, 0, 0, 0.5)';
      var tcount = Math.floor(CANVAS_WIDTH / 80) + 2;
      for (var tw = 0; tw < tcount; tw++) {
        var twx = ((tw * 120 + offset * 0.6) % (CANVAS_WIDTH + 160)) - 80;
        var twh = 80 + (tw % 3) * 50;
        ctx.fillRect(twx, CANVAS_HEIGHT - twh, 30, twh);
        // Battlements on top
        for (var bt = 0; bt < 3; bt++) {
          ctx.fillRect(twx + bt * 12, CANVAS_HEIGHT - twh - 10, 8, 10);
        }
      }
      break;
  }

  ctx.restore();
}

function drawCloud(ctx, cx, cy, size, color) {
  ctx.fillStyle = color || 'rgba(255, 255, 255, 0.4)';
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.5, 0, Math.PI * 2);
  ctx.arc(cx + size * 0.35, cy - size * 0.15, size * 0.4, 0, Math.PI * 2);
  ctx.arc(cx + size * 0.6, cy + size * 0.05, size * 0.35, 0, Math.PI * 2);
  ctx.arc(cx - size * 0.3, cy + size * 0.1, size * 0.35, 0, Math.PI * 2);
  ctx.fill();
}

// -- Particle Drawing --
function drawParticle(ctx, p, sx, sy) {
  ctx.save();
  var lifeRatio = p.life / p.maxLife;
  ctx.globalAlpha = lifeRatio;
  ctx.fillStyle = p.color;
  var px = sx !== undefined ? sx : p.x;
  var py = sy !== undefined ? sy : p.y;
  ctx.fillRect(px - p.size / 2, py - p.size / 2, p.size, p.size);
  ctx.restore();
}

// -- Utility: Rounded Rectangle --
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Level generation helper - creates empty tile grid
function createTileGrid(width, height) {
  var grid = [];
  for (var r = 0; r < height; r++) {
    grid.push([]);
    for (var c = 0; c < width; c++) {
      grid[r].push(TILE.AIR);
    }
  }
  return grid;
}
